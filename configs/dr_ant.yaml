# Sprint 3 — Domain-Randomized PPO on Ant-v4.
# Same hyperparameters as Sprint 1 baseline + reward shaping from Sprint 2
# + domain randomization on body mass / friction / actuator gain / obs noise / action delay.
algo: PPO
env_id: Ant-v4
seed: 0

reward_shaping:
  energy: 0.005
  orientation: 0.5

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [256, 256]

training:
  total_timesteps: 2500000
  n_envs: 1
  vec_normalize: true
  device: cuda

domain_randomization:
  enabled: true
  body_mass: {low: 0.8, high: 1.2}        # +/- 20%
  friction: {low: 0.5, high: 1.5}         # relative to default
  actuator_gain: {low: 0.8, high: 1.2}    # +/- 20%
  obs_noise_std: 0.05
  action_delay_steps: {low: 0, high: 2}   # uniform in {0, 1, 2}

logging:
  tensorboard_log: experiments/logs
  save_freq: 50000