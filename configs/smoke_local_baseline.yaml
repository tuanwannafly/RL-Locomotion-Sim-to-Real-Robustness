# Tiny local validation config — used for pipeline tests only.
# Not intended for the real runs (which go on Colab at 2.5M steps).
algo: PPO
env_id: Ant-v4
seed: 0

reward_shaping:
  energy: 0.005
  orientation: 0.5

ppo:
  learning_rate: 3.0e-4
  n_steps: 512          # smaller than the 2048 default so we can fit a quick local run
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [128, 128]

training:
  total_timesteps: 30000
  n_envs: 1
  vec_normalize: true
  device: cuda

domain_randomization:
  enabled: false        # set true in dr_smoke_local.yaml

logging:
  tensorboard_log: experiments/logs
  save_freq: 5000