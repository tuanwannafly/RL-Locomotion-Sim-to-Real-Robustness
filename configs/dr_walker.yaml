# Sprint 3 placeholder — DR policy for Walker2d-v4.
algo: PPO
env_id: Walker2d-v4
seed: 0

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5

training:
  total_timesteps: 2500000
  device: cuda

domain_randomization:
  enabled: true
  body_mass: {low: 0.8, high: 1.2}
  friction: {low: 0.5, high: 1.5}
  actuator_gain: {low: 0.8, high: 1.2}
  obs_noise_std: 0.05
  action_delay_steps: {low: 0, high: 2}

logging:
  tensorboard_log: experiments/logs
  save_freq: 50000