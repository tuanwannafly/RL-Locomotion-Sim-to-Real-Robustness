# Tiny local DR validation config — pairs with smoke_local_baseline.yaml.
algo: PPO
env_id: Ant-v4
seed: 0

reward_shaping:
  energy: 0.005
  orientation: 0.5

ppo:
  learning_rate: 3.0e-4
  n_steps: 512
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [128, 128]

training:
  total_timesteps: 30000
  n_envs: 1
  vec_normalize: true
  device: cuda

domain_randomization:
  enabled: true
  body_mass: {low: 0.8, high: 1.2}
  friction: {low: 0.5, high: 1.5}
  actuator_gain: {low: 0.8, high: 1.2}
  obs_noise_std: 0.05
  action_delay_steps: {low: 0, high: 2}

logging:
  tensorboard_log: experiments/logs
  save_freq: 5000